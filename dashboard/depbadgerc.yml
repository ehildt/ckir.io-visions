    - name: '@tailwindcss/postcss'
      link: https://github.com/tailwindlabs/tailwindcss
    - name: '@testing-library/jest-dom'
      link: https://github.com/testing-library/jest-dom
    - name: '@testing-library/vue'
      link: https://github.com/testing-library/vue-testing-library
    - name: '@types/node'
      link: https://github.com/DefinitelyTyped/DefinitelyTyped
    - name: '@vitejs/plugin-vue'
      link: https://github.com/vitejs/vite-plugin-vue
    - name: '@vitest/coverage-v8'
