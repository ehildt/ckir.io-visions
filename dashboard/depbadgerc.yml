      user: ehildt
      repo: ckir.io-visions
      branch: main
      namedLogo: github
    - name: github
      metric: stars
      user: ehildt
      repo: ckir.io-visions
      branch: main
      namedLogo: github
    - name: github
      metric: license
      user: ehildt
      repo: ckir.io-visions
      branch: main
      namedLogo: github
    - name: codecov
      user: ehildt
      repo: ckir.io-visions
      namedLogo: codecov
