integrity: d7eab23a175ae2b4c0ba09e9940c87159706fb9d29fa04fc39fe1d9a9cfbbabf
# yaml-language-server: $schema=https://raw.githubusercontent.com/ehildt/depbadge/refs/heads/main/depbadgerc.schema.json

target: README.md

manifest: package.json

output:
  - markdown

dependenciesLayout: &DEPENDENCIES_LAYOUT
  position: center
  showHeader: false

dependenciesStyle: &DEPENDENCIES_STYLE
  labelColor: '333'
  isError: false
  namedLogo: npm
  logoWidth: 40
  style: flat-square
  cacheSeconds: 3600

devDependenciesStyle: &DEV_DEPENDENCIES_STYLE
  <<: *DEPENDENCIES_STYLE
  style: flat-square

statusBadgesStyle: &STATUS_BADGES_STYLE
  labelColor: '333'
  isError: false
  namedLogo: github
  logoWidth: 40
  style: for-the-badge
  cacheSeconds: 3600

dependencies:
  layout:
    <<: *DEPENDENCIES_LAYOUT
    header: Dependencies
    showHeader: true
    position: center
  badgeStyle: *DEPENDENCIES_STYLE
  items:
    - name: '@headlessui/vue'
      link: https://github.com/tailwindlabs/headlessui
    - name: '@paralleldrive/cuid2'
      link: https://github.com/paralleldrive/cuid2
    - name: '@tanstack/vue-query'
      link: https://github.com/tanstack/query
    - name: '@vueuse/components'
      link: https://github.com/vueuse/vueuse
    - name: '@vueuse/core'
      link: https://github.com/vueuse/vueuse
    - name: date-fns
      link: https://github.com/date-fns/date-fns
    - name: lucide-vue-next
      link: https://github.com/lucide-icons/lucide
    - name: pinia
      link: https://github.com/vuejs/pinia
    - name: socket.io-client
      link: https://github.com/socketio/socket.io
    - name: vue
      link: https://github.com/vuejs/core
    - name: vue3-toastify
      link: https://github.com/jerrywu001/vue3-toastify

