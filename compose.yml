services:
  server:
    container_name: server
    restart: on-failure
    build:
      context: ./server
      target: local
    volumes:
      - ./server:/app
    env_file:
      - ./server/.env
    ports:
      - "3000:3000"
    depends_on:
      - keydb
      - postgres
    networks:
      - ckir.io-visions

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: on-failure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: visions
      POSTGRES_PASSWORD: visions
      POSTGRES_DB: visions
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ckir.io-visions

  dashboard:
    container_name: dashboard
    restart: on-failure
    build:
      context: ./dashboard
      target: local
    volumes:
      - ./dashboard:/app
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_SOCKET_URL=http://localhost:3000
    ports:
      - "5173:5173"
    networks:
      - ckir.io-visions

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    gpus: all
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    networks:
      - ckir.io-visions

  keydb:
    image: eqalpha/keydb
    container_name: keydb
    restart: on-failure
    ports:
      - 6379:6379
    volumes:
      - keydb_data:/data
      - ./server/keydb.conf:/usr/local/etc/keydb/keydb.conf
    command: keydb-server /usr/local/etc/keydb/keydb.conf
    networks:
      - ckir.io-visions

volumes:
  ollama_data:
  keydb_data:
  postgres_data:

networks:
  ckir.io-visions:
    name: ckir.io-visions
    driver: bridge