name: RELEASE_CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  HUSKY: 0

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - run: pnpm -r install --frozen-lockfile

      - name: Lint — Server
        run: |
          cd server
          pnpm lint
          pnpm depcruise
          pnpm lint:unused

      - name: Lint — Dashboard
        run: |
          cd dashboard
          pnpm lint
          pnpm depcruise
          pnpm lint:unused

      - name: Build — Server
        run: |
          cd server
          pnpm build:prod

      - name: Build — Dashboard
        run: |
          cd dashboard
          pnpm build

      - name: Test — Server
        run: |
          cd server
          pnpm test
          pnpm test:cov

      - name: Test — Dashboard
        run: |
          cd dashboard
          pnpm test
          pnpm test:cov

      - name: Upload Coverage — Server
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          flags: server
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Coverage — Dashboard
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          fail_ci_if_error: true
          flags: dashboard
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Build Artifact — Server
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: server-dist
          path: server/dist/

      - name: Build Artifact — Dashboard
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/

  repo-update:
    if: github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: pnpm -r install --frozen-lockfile

      - name: Changeset
        run: pnpm changeset version

      - name: Commit version bump
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "VERSION BUMP"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Server dist
        uses: actions/download-artifact@v4
        with:
          name: server-dist
          path: server/dist/

      - name: Download Dashboard dist
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/

      - name: Depbadge — Server
        run: cd server && npx @ehildt/depbadge

      - name: Depbadge — Dashboard
        run: cd dashboard && npx @ehildt/depbadge

      - name: Commit badge bump
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "BADGE BUMP"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  wiki:
    if: github.event_name == 'push'
    needs: build-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki

      - name: Sync wiki
        run: |
          test -d .wiki || { echo "::error::.wiki folder missing"; exit 1; }
          rsync -a --delete --exclude '.git/' .wiki/ wiki/

      - name: Commit wiki
        working-directory: wiki
        run: |
          git config user.name "wiki[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "WIKI UPDATE"
          git push
